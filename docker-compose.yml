services:
  arr-inventory:
    container_name: arr-inventory
    image: ghcr.io/lvr/arr-inventory:latest
    environment:
      DATA_ROOT: ${DOCKER_DATA_ROOT:-/data}
      DATABASE_PATH: /var/lib/arr-inventory/app.db
      DOWNLOADS_PATH: ${DOWNLOADS_PATH:-${DOCKER_DATA_ROOT:-/data}/downloads}
      MOVIES_PATH: ${MOVIES_PATH:-${DOCKER_DATA_ROOT:-/data}/media/movies}
      TV_PATH: ${TV_PATH:-${DOCKER_DATA_ROOT:-/data}/media/tv}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      QBITTORRENT_URL: ${QBITTORRENT_URL}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD}
      TORRENT_MIN_SEED_TIME_DAYS: ${TORRENT_MIN_SEED_TIME_DAYS}
      TORRENT_MIN_RATIO: ${TORRENT_MIN_RATIO}
      RADARR_URL: ${RADARR_URL}
      RADARR_API_KEY: ${RADARR_API_KEY}
      SONARR_URL: ${SONARR_URL}
      SONARR_API_KEY: ${SONARR_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ${HOST_DATA_ROOT:-/data}:${DOCKER_DATA_ROOT:-/data}:ro
      - arr_inventory_db:/var/lib/arr-inventory

volumes:
  arr_inventory_db:
